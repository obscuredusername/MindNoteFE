name: 🚀 Deploy — Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH → Clone → Build → Run → Cleanup
    runs-on: self-hosted   # ← your local machine is the runner

    steps:
      # ── 1. Write env file on the runner (your local machine) ─────
      #    The multiline secret is safely written to a temp file here,
      #    then SCP'd to the server — no quoting nightmares over SSH.
      - name: Write .env.production to temp file
        run: printf '%s' "$PROD_ENV_FILE" > /tmp/mindnote-prod.env
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}

      # ── 2. SCP the env file to the server ────────────────────────
      - name: SCP env file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          source:   /tmp/mindnote-prod.env
          target:   /tmp/

      # ── 3. SSH → clone → build → run → cleanup ───────────────────
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          envs:     GITHUB_PAT,GITHUB_REPOSITORY
          script: |
            set -e

            DEPLOY_DIR="/tmp/mindnote-fe-prod-build"
            REPO_URL="https://oauth2:${GITHUB_PAT}@github.com/${GITHUB_REPOSITORY}.git"

            # ── Clone latest code ───────────────────────────────
            echo "📥 Cloning repository (depth=1)..."
            rm -rf "$DEPLOY_DIR"
            git clone --depth=1 "$REPO_URL" "$DEPLOY_DIR"

            cd "$DEPLOY_DIR/mindNoteFE"

            # ── Place env file ──────────────────────────────────
            echo "📝 Writing environment file..."
            cp /tmp/mindnote-prod.env .env.production

            # ── Build Docker image ──────────────────────────────
            echo "🔨 Building Docker image..."
            docker build \
              --build-arg APP_ENV=production \
              -t mindnote-fe:prod \
              .

            # ── Restart container ───────────────────────────────
            echo "🔄 Restarting container..."
            docker stop mindnote-fe-prod 2>/dev/null || true
            docker rm   mindnote-fe-prod 2>/dev/null || true

            docker run -d \
              --name mindnote-fe-prod \
              --restart unless-stopped \
              -p 3000:3000 \
              mindnote-fe:prod

            # ── Cleanup ─────────────────────────────────────────
            echo "🧹 Cleaning up..."
            cd /
            rm -rf "$DEPLOY_DIR"
            rm -f /tmp/mindnote-prod.env
            docker image prune -f

            echo "✅ Production is live on port 3000!"

          envs: GITHUB_PAT=${{ secrets.GITHUB_PAT }},GITHUB_REPOSITORY=${{ github.repository }}
