name: 🧪 Deploy — Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    name: SSH → Clone → Build → Run → Cleanup
    runs-on: self-hosted   # ← your local machine is the runner

    steps:
      # ── 1. Write env file on the runner (your local machine) ─────
      - name: Write .env.staging to temp file
        run: printf '%s' "$STAGING_ENV_FILE" > /tmp/mindnote-staging.env
        env:
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}

      # ── 2. SCP the env file to the server ────────────────────────
      - name: SCP env file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          source:   /tmp/mindnote-staging.env
          target:   /tmp/

      # ── 3. SSH → clone → build → run → cleanup ───────────────────
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/tmp/mindnote-fe-staging-build"
            REPO_URL="https://oauth2:${GITHUB_PAT}@github.com/${GITHUB_REPOSITORY}.git"

            # ── Clone latest code ───────────────────────────────
            echo "📥 Cloning repository (depth=1)..."
            rm -rf "$DEPLOY_DIR"
            git clone --depth=1 --branch staging "$REPO_URL" "$DEPLOY_DIR"

            cd "$DEPLOY_DIR/mindNoteFE"

            # ── Place env file ──────────────────────────────────
            echo "📝 Writing environment file..."
            cp /tmp/mindnote-staging.env .env.staging

            # ── Build Docker image ──────────────────────────────
            echo "🔨 Building Docker image..."
            docker build \
              --build-arg APP_ENV=staging \
              -t mindnote-fe:staging \
              .

            # ── Restart container ───────────────────────────────
            echo "🔄 Restarting container..."
            docker stop mindnote-fe-staging 2>/dev/null || true
            docker rm   mindnote-fe-staging 2>/dev/null || true

            docker run -d \
              --name mindnote-fe-staging \
              --restart unless-stopped \
              -p 3001:3000 \
              mindnote-fe:staging

            # ── Cleanup ─────────────────────────────────────────
            echo "🧹 Cleaning up..."
            cd /
            rm -rf "$DEPLOY_DIR"
            rm -f /tmp/mindnote-staging.env
            docker image prune -f

            echo "✅ Staging is live on port 3001!"

          envs: GITHUB_PAT=${{ secrets.GITHUB_PAT }},GITHUB_REPOSITORY=${{ github.repository }}
